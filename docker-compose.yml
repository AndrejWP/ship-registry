services:
  postgres:
    image: postgres:16
    container_name: ship_registry_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ship_registry}
      POSTGRES_USER: ${POSTGRES_USER:-ship_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ship_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data:

